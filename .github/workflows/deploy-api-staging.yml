name: Deploy API (staging)

on:
  pull_request:
    branches: [main] # PRs TARGETING main
    # default types = [opened, synchronize, reopened] = created + every push
    paths: # deploy ONLY when the API changes
      - "my-home-api/**"
      - ".github/workflows/deploy-api-staging.yml"

permissions:
  id-token: write # REQUIRED for GitHub OIDC -> AWS
  contents: read
  pull-requests: write # to comment the staging URL on the PR

concurrency:
  group: deploy-api-staging # ONE staging stack shared by all PRs
  cancel-in-progress: true # a newer push cancels a stale deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-home-api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -> dist)
        run: npm run build

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: SAM build
        run: sam build

      - name: SAM deploy (staging stack)
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name my-home-api-staging \
            --s3-prefix my-home-api-staging \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              "DbUri=${{ secrets.DB_URI }}"

      - name: Read staging API URL
        id: url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name my-home-api-staging \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Staging API: $URL"

      - name: Comment staging URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.url.outputs.api_url }}";
            const marker = "<!-- staging-api-url -->";
            const body = `${marker}\n🚀 **Staging API deployed:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
