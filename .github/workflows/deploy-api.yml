name: Deploy API (production)

on:
  push:
    branches: [main] # repo's default branch
    paths: # deploy ONLY when the API changes
      - "my-home-api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch: {} # manual "Run workflow" button

permissions:
  id-token: write # REQUIRED for GitHub OIDC -> AWS
  contents: read

concurrency:
  group: deploy-api # never two prod deploys at once
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-home-api
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20 # matches template.yaml Runtime nodejs20.x

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -> dist)
        run: npm run build

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name my-home-api \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides \
              "DbUri=${{ secrets.DB_URI }}"

      - name: Print API URL
        run: |
          aws cloudformation describe-stacks \
            --stack-name my-home-api \
            --region us-east-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text
